services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas_v1
    ports:
      - "5432:5432"
    volumes:
      - atlas_v1_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas_v1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Web UI: http://localhost:8080 — System: PostgreSQL, Server: db, User: atlas, Password: atlas, Database: atlas_v1
  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  atlas_v1_pg_data:
